notes: |
  Forskningsparken is a conference center at Oslo Science Park with 26 meeting rooms.
  
  Main Spaces:
  - Toppsenteret: Large meeting room (Faros) + 2 smaller rooms (Nimbus, Stratus) + lounge + rooftop terrace
  - Forum: Auditorium for 160 people (lectures, presentations, courses)
  - Flora Lounge: Large room (Fauna - 80 people) + 2 smaller rooms (Fungi, Mikro) + lounge
  - Forskningshagen: Outdoor area
  
  Strengths:
  - Multiple meeting rooms (26 total)
  - Flexible spaces
  - Rooftop terrace with panoramic views
  - Full-service provider
  - Academic credibility
  
  Weaknesses:
  - Max single room capacity is 160 (well below 400 target)
  - Would require combining multiple spaces
  - Not ideal for single-track conference format
  
  Contact: Via website
  Address: Gaustadalléen, Oslo
