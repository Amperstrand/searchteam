notes: |
  3000m² remodeled Norrøna headquarters with ultra-modern event spaces.
  Located at Vollsveien 13H, 1360 Bærum — OUTSIDE OSLO, poor public transport.
  Own bar and café. Ultra-modern design, attractive to sponsors.
  Main concern: location. Bærum is a 15-20 min commute from city center.
  May not work for attendees without cars. Check shuttle possibilities.
  Probably better as a sponsor/village space supplement than main venue.
