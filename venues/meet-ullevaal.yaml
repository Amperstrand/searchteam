  - Sports/conference hybrid feel may not match BSides identity
  - No pricing available on website

  ## Assessment:
  LOW PRIORITY. While professional and well-equipped, the stadium setting
  and unknown capacity make this a lower priority. The corporate sports
  venue atmosphere doesn't match BSides grassroots identity. Worth a
