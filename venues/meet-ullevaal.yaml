  ADDRESS: Connected to Ullevaal Stadium, Oslo
  Professional conference center at Norway's national football stadium.
  Multiple conference rooms with professional AV, in-house catering, bar service.

  NOTE: Exact capacity of largest conference room not found on website.
  The venue is designed for corporate events and conferences of various sizes.
  Ullevaal is well-connected by T-bane (metro line 3/5 to Ullevål stadion).

  ## Concerns:
  - Exact arena capacity unknown — must verify meets 400 threshold
