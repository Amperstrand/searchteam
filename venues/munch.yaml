  RESEARCHED: Website (munch.no/en/venue-hire).

  Art museum offering event venues "out of the ordinary."
  Surrounded by world-class Edvard Munch art.
  Located at Edvard Munchs plass 1, 0194 Oslo — Bjørvika, near Opera.

  ## Characteristics:
  - "Event venues out of the ordinary" for courses, conferences, business events
  - World-class art setting
  - Restaurant and bar on premises
  - Modern building (opened 2021) — 13 floors, innovative architecture

  ## Concerns:
  - Capacity unknown — museum space, likely not designed for 400+ conferences
  - Art museum setting — may not have appropriate AV/tech for tech talks
  - Museum opening hours may restrict event timing
  - Premium venue in Bjørvika — likely very expensive
  - Exhibition spaces are designed for art viewing, not conference seating
  - May not have enough breakout/village rooms
  - Unique atmosphere but uncertain practical fit for BSides format
  - External AV equipment likely needed

  CONTACT: Via website (munch.no/en/venue-hire)
