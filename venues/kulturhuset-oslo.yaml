  20-year age limit on entire venue.

  ## Overview:
  Cultural venue in Grünerløkka/Sofienberg area with multiple rooms across
  three floors, four bars. Five rooms available for events: concerts, seminars,
  book launches, debates, meetings, and parties.

  ## Rooms:
  Hovedrommet: 350 standing / 180 seated, stage ~5×4m (expandable to 6×4m),
    professional sound & light, not available weekend evenings
  Boksen: 120 standing / 90 seated, high ceiling, professional sound & light,
    not available weekend evenings
  Laboratoriet: 120 standing / 90 seated, overlooking greenhouse, largest screen
    in house, not available weekend evenings
  Spillbaren: Board games, stage, projectors, own bar, configurable room
  Det Hemmelige Rommet: Small meeting room, whiteboard, screen, ~10 people

  ## Village potential:
  4 rooms (Boksen, Laboratoriet, Spillbaren, Det Hemmelige Rommet) could serve
  as village/breakout spaces when Hovedrommet is used for main stage.

  ## Strengths for BSides:
  - Multiple rooms in one building — good for villages
  - Creative/cultural atmosphere fits BSides grassroots vibe
  - Young, hip venue in trendy Grünerløkka area
  - Professional sound/light on main stage
  - Four bars and in-house catering available
  - In-house restaurant (Matbaren)
  - Relatively affordable for a cultural venue (estimate)

  ## Concerns:
  - Main room only 180 seated / 350 standing — BELOW 400 threshold
  - No rooms individually meet the 400 capacity requirement
  - Weekend evening availability restricted (main rooms)
  - BSides is typically Saturday — may conflict with venue policy
  - No public pricing
  - 20-year age limit could exclude younger attendees
  - WiFi quality unknown
  - Sponsor booth space limited (cultural venue, not conference center)
  - Loading/access for heavy AV equipment unknown
