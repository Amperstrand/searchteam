notes: |
  Factory Tøyen is an industrial warehouse venue in Tøyen with multiple spaces:
  - The Hall: Large main space for conferences, product launches, exhibitions, dinners
  - The Chamber: Smaller room for workshops/breakouts (up to 16 people)
  - The Loft: Upper space with good acoustics for workshops/presentations
  
  Strengths:
  - Industrial aesthetic fits BSides hacker vibe
  - Multiple breakout spaces
  - Good loading access
  - Flexible layout
  - Central Oslo location
  
  Weaknesses:
  - No parking on property (public transport/parking houses nearby)
  - Noise restrictions (events must end by 23:00 due to residential area)
  - Alcohol service requires separate municipal permit
  
