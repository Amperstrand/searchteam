notes: |
  RESEARCHED: Website (houseofoslo.no), venueful.com listing.

  Conference center and office hotel in the VIA building, Vika.
  Located at Ruseløkkveien 34, 0251 Oslo — central business district.

  ## Facilities:
  - Meeting rooms, auditorium, arbitration hall
  - For both small and large groups
  - Fully digital/modern facilities
  - "Where quality meets expertise"

  ## Characteristics:
  - Very corporate — located in CBD signal building (VIA)
  - Focus on board meetings, arbitration, corporate conferences
  - Modern, professional environment

  ## Concerns:
  - Auditorium capacity unknown — likely below 400 (corporate meeting focus)
  - Very corporate atmosphere — poor BSides vibe fit (worse than Clarion Hub)
  - No public pricing
  - Limited info on tech capabilities for large events
  - Sponsor attractiveness is high (premium corporate setting) but at the cost
    of the grassroots BSides identity
  - Probably expensive — CBD premium location

  CONTACT: resepsjon@houseofoslo.no, +47 902 11 177
