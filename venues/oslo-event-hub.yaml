  Part of byOSLO group (BA3, Nedre Løkka, F6, Justisen, Libertine, Michaels, BOX).

  ## Overview:
  Former museum (Gamle Museet) completely renovated 2022. 2000m² event space
  in central Oslo at Dronningens gate 4. Total capacity up to 850 guests.
  Top-modern technical equipment with striking light installations.

  ## Capacity:
  Up to 850 guests total. Multiple room configurations possible.
  Conference, seminar, workshop, exhibition, and party formats supported.
  Can do full-day conference followed by evening event in same space.

  ## Technical:
  Top-modern AV equipment. Digital and hybrid event capabilities.
  Full technical equipment list available on their website.

  ## Strengths for BSides:
  - Very large capacity (850) with room to grow
  - Central Oslo location (Dronningens gate 4, near Oslo S)
  - Award-winning venue — professional operation
  - Flexible layout for day conference + evening party
  - Modern technical equipment included
  - Major corporate clients (DNB, Storebrand, IKEA, KLP) — proven track record

  ## Concerns:
  - No public pricing — must request quote
  - Award-winning/luxury branding may mean high cost
  - Corporate party venue — may lack the grassroots BSides vibe
  - Village/sponsor space layout unclear — single large hall?
  - Weekend availability unknown (popular for corporate julebord)
  - Need to verify WiFi quality for security conference use
