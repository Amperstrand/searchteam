notes: |
  RESEARCHED: Website (deichman.no/event-og-konferanse).

  Oslo's main public library, opened 2020. Modern architecture, 6 floors.
  Event and conference venue rental. Hosts ~100 external conferences/year.
  Located at Anne-Cath Vestlys plass, 0154 Oslo — 200m from Oslo S.

  ## Deichmansalen (Main Hall):
  - Fixed amphitheatre, 150 seats
  - 108m² stage
  - Comprehensive tech for all production types
  - Streaming, hybrid, concerts, theatre possible

  ## Vrimle (Foyer):
  - Open area connecting Deichmansalen, cinema, and meeting rooms
  - LED screen, catering area, toilets
  - Registration, receptions, exhibitions, mingling

  ## Kinosalen (Cinema):
  - 68 seats, retractable amphitheatre
  - 4K projector, surround sound
  - Becomes "black box" (~42m²) when seats retracted

  ## Kringsjå (Exclusive):
  - Overhanging gallery with fjord view, 4th-5th floor
  - Unique amphitheater — spectacular setting
  - Only rented a few times per year — 90,000 NOK+

  ## Meeting/Conference Rooms:
  - 10+ rooms of various sizes available for hire
  - Blankvann, Nøklevann, plus others

  ## Pricing (all ex VAT):
  - Deichmansalen + Vrimle full day: 49,500 NOK
  - Deichmansalen + Vrimle half day: 29,000 NOK
  - Cinema full day: 20,000 NOK
  - Cinema half day: 14,000 NOK
  - AV technician full day: 6,500 NOK
  - AV technician half day: 5,800 NOK

  ## Concerns:
  - Deichmansalen at 150 seats is FAR below 400 threshold — DISQUALIFYING
  - No single room large enough for 400+ people
  - Multiple rooms could be combined but would require multi-track format
  - Public library — shared space, not exclusive for private events
  - No bar/dinner service (catering by Kaffoteket only — café-level)
  - May not project "premium conference" image for sponsors
  - Total cost for all rooms would need to be calculated
  - WiFi quality for 400+ security conference attendees unknown

  CONTACT: Via website booking form (deichman.no)
  Source: deichman.no (2026-04-08)
