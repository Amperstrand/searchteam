  RESEARCHED: Website (nobelpeacecenter.org/en/about-us/venue-hire).

  "Oslo's most unique meeting place" — hosts Nobel Peace Prize laureates annually.
  Located by Aker Brygge, Rådhusplassen 1, 0151 Oslo.

  ## Characteristics:
  - Museum/event space with world-class art exhibitions
  - Unique setting surrounded by Nobel Prize history
  - Attracts leaders and people who change the world
  - Central waterfront location

  ## Concerns:
  - Capacity unknown — likely museum-scale, not conference-scale
  - No dedicated conference rooms — adapted museum spaces
  - External catering required (no in-house)
  - No bar service
  - Very high-profile venue — likely very expensive
  - Museum hours/access may restrict event timing
  - Not designed for tech conferences
  - Security may be complex (government-level venue)
  - While extremely attractive for sponsors, practical fit for BSides is questionable

  CONTACT: Via website (nobelpeacecenter.org)
