notes: |
  RESEARCHED: Website (roverstaden.no), oslokonserthus.no booking page.

  Club venue and event space in the basement under Oslo Konserthus.
  Located at Munkedamsveien 15, 0250 Oslo. Same building as Oslo Concert Hall.
  Formerly the legendary Club7 and Sardines venue.

  ## Capacity:
  - Standing: 600
  - Seated long tables: 200
  - Mingling/high-table: 350-400
  - Theatre style: 300

  ## Characteristics:
  - Underground/intimate layout — "unique sense of closeness to the stage"
  - Good for concerts, kick-offs, conferences, corporate events
  - Bar service available
  - Open only for events (not a regular venue)
  - Oslo Konserthus handles booking and technical support

  ## Concerns:
  - Below-ground venue — no natural light
  - Seating quality unknown (club venue, likely not theatre seating)
  - 300 theatre is below 400 threshold, but 600 standing exceeds it
  - Layout flexibility limited (single room)
  - No separate village spaces — one room only
  - No public pricing — must request quote
  - Shared building with Oslo Konserthus — other events may run simultaneously upstairs
  - Vibe is more "club night" than "tech conference"

  CONTACT: Terje Bontveit 918 61 693, via oslokonserthus.no booking
  Source: roverstaden.no, oslokonserthus.no (2026-04-08)
