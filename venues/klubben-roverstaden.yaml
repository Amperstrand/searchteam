  ## Overview:
  Club/concert venue at Røverstaden, managed by Oslo Konserthus. Intimate layout
  that creates closeness to stage. Available for conferences, seminars, kick-offs,
  and corporate events.

  ## Capacity:
  - Standing: 600
  - Seated long tables: 200
  - Theatre style: 300-400
  - Mingling / high-table: 350-400

  ## Technical:
  Professional sound and lighting (concert-grade). Stage and AV equipment available.
  Managed by Oslo Konserthus — professional in-house technical team.

  ## Catering:
  All catering through Fursetgruppen (exclusive rights at Oslo Konserthus venues).
  High-end catering from light refreshments to full banquets.

  ## Strengths for BSides:
  - Theatre seating 300-400 meets capacity requirement
  - Excellent concert-grade sound and lighting
  - Central Oslo location (Vika, near Nationaltheatret)
  - Bar service + Fursetgruppen catering
  - Club atmosphere fits BSides grassroots vibe
  - Professional venue management

  ## Concerns:
  - No public pricing — must request quote
  - Primarily a concert/club venue — may not have village breakout spaces
  - Single room — no obvious village/sponsor area unless foyer used
  - Shared building with Oslo Konserthus (other events may run concurrently)
  - Seating quality unknown for all-day conference (club venue)
  - Loading/equipment access details unknown
