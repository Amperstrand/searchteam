  ## Overview:
  One of Norway's leading venues for music and cultural events. Home of the
  Oslo Philharmonic. Located in Vika, central Oslo. Professional operation
  with in-house technicians, hosts, security, and cloakroom for all guests.

  ## Rooms:
  Store Sal: 1,404 seats (stalls + balcony), stage 13m deep × 13-22m wide
  Lille Sal: 266 auditorium / 300 standing, 250m², stage 4×9m, 200/200Mbps internet
  Glasshuset: 280 standing / 250 seated, 364m², glass pavilion floating above street
  Klubben/Røverstaden: 600 standing / 300-400 theatre (separate location)
  Multiple foyers across several levels for exhibitions, catering, social areas

  ## Breakout potential:
  Lille Sal (266) + Glasshuset (280) could serve as village/overflow spaces.
  Large foyers could host sponsor booths and social areas.

  ## Technical:
  World-class acoustics. Professional sound, lighting, AV.
  In-house technical team. Ticketing through Tixly (mandatory for ticketed events).
  Marketing packages available.

  ## Strengths for BSides:
  - Massive capacity with room for growth far beyond 500
  - World-class sound and acoustics
  - Professional venue with full service (security, cloakroom, catering)
  - Multiple rooms for villages/breakouts (Lille Sal, Glasshuset, foyers)
  - Central location near Nationaltheatret
  - Green room/backstage facilities
  - High-speed internet confirmed (200/200 Mbps in Lille Sal)
  - Fursetgruppen catering (high-end, reliable)

  ## Concerns:
  - Almost certainly too expensive — premium concert hall
  - 1404 seats is massive overkill for 400-500 (may feel empty)
  - Concert hall fixed seating — limited layout flexibility
  - Very formal/prestigious atmosphere — poor BSides vibe fit
  - Lille Sal at 266 is below threshold for main stage
  - No public pricing — likely very high
  - EXCLUSIVE catering through Fursetgruppen — no external caterers allowed
  - Likely not available on weekends (Oslo Philharmonic schedule)
